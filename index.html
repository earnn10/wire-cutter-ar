<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AR Cyber Defusal Zone</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tracking.js/1.3.0/tracking-min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Prompt:wght@300;500;700&display=swap');
        
        body {
            margin: 0;
            padding: 0;
            font-family: 'Prompt', sans-serif;
            background: radial-gradient(circle, #1a0033 0%, #050010 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }

        #bomb-panel {
            position: relative;
            width: 100%;
            max-width: 650px;
            height: 500px;
            background: #0d0d1a;
            border: 4px solid #00f0ff;
            border-radius: 16px;
            box-shadow: 0 0 30px rgba(0, 240, 255, 0.3), inset 0 0 20px rgba(0, 240, 255, 0.2);
            overflow: hidden;
        }

        #ar-camera-feed {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            opacity: 0.85;
            filter: contrast(1.1) brightness(0.9);
        }

        #hud-grid {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 2;
            background: linear-gradient(rgba(0, 240, 255, 0.05) 1px, transparent 1px),
                        linear-gradient(90deg, rgba(0, 240, 255, 0.05) 1px, transparent 1px);
            background-size: 30px 30px;
            pointer-events: none;
        }

        #ar-wires-overlay {
            position: absolute;
            top: 0;
            left: 0;
            z-index: 3;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: space-around;
            align-items: flex-end;
            box-sizing: border-box;
            padding: 0 40px 60px 40px;
        }

        .wire-capsule {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .wire-line {
            width: 24px;
            height: 240px;
            border-radius: 12px;
            border: 3px solid #ffffff;
            position: relative;
            background-image: repeating-linear-gradient(45deg, transparent, transparent 10px, rgba(0,0,0,0.3) 10px, rgba(0,0,0,0.3) 20px);
        }

        .wire-label {
            color: #ffffff;
            font-size: 12px;
            font-weight: bold;
            margin-top: 10px;
            padding: 2px 8px;
            background: rgba(0,0,0,0.6);
            border-radius: 4px;
            border: 1px solid rgba(255,255,255,0.3);
            text-transform: uppercase;
        }

        #ui-header {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            z-index: 4;
            background: linear-gradient(to bottom, rgba(13, 13, 26, 0.95), transparent);
            padding: 20px 0 10px 0;
            color: white;
            text-align: center;
        }

        #timer {
            font-family: 'Orbitron', sans-serif;
            font-size: 46px;
            color: #ff0055;
            font-weight: 700;
            text-shadow: 0 0 15px rgba(255, 0, 85, 0.8);
            letter-spacing: 2px;
            margin: 5px 0;
        }

        #instruction {
            font-size: 15px;
            margin: 5px 0 0 0;
            letter-spacing: 1px;
        }

        .screen-overlay {
            display: none;
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 5;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            color: white;
            text-align: center;
        }

        #success-screen { background: rgba(0, 15, 5, 0.9); border: 4px solid #00ff66; }
        #fail-screen { background: rgba(20, 0, 5, 0.95); border: 4px solid #ff0055; }

        .btn-action {
            font-family: 'Prompt', sans-serif;
            padding: 12px 30px;
            font-size: 18px;
            font-weight: bold;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0,0,0,0.4);
            transition: 0.2s;
        }
        #success-screen .btn-action { background: #00cc52; }
        #fail-screen .btn-action { background: #ff0055; }
        .btn-action:hover { transform: scale(1.05); }

        #explosion-effect {
            display: none;
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #ffffff;
            z-index: 6;
            pointer-events: none;
        }
        @keyframes boom {
            0% { background: #ffffff; opacity: 1; }
            15% { background: #ffcc00; }
            35% { background: #ff3300; }
            100% { background: transparent; opacity: 0; }
        }
    </style>
</head>
<body>

    <div id="bomb-panel">
        <div id="ar-camera-feed"></div>
        <div id="hud-grid"></div>
        <div id="ar-wires-overlay"></div>
        <div id="explosion-effect"></div>

        <div id="ui-header">
            <span style="font-size: 12px; color: #00f0ff; letter-spacing: 3px; font-weight: bold;">CYBER DEFUSAL SYSTEM v3.0</span>
            <div id="timer">30.00</div>
            <div id="instruction"></div>
        </div>
        
        <div id="success-screen" class="screen-overlay">
            <h1 style="font-family: 'Orbitron'; color: #00ff66; font-size: 36px; text-shadow: 0 0 15px #00ff66; margin: 0;">SYSTEM SECURED</h1>
            <p id="success-msg" style="margin: 20px 0; font-size: 16px; max-width: 80%;"></p>
            <button class="btn-action" onclick="resetGame()">เริ่มระบบใหม่</button>
        </div>

        <div id="fail-screen" class="screen-overlay">
            <h1 style="font-family: 'Orbitron'; color: #ff0055; font-size: 36px; text-shadow: 0 0 15px #ff0055; margin: 0;">💥 DETONATED 💥</h1>
            <p id="fail-msg" style="margin: 20px 0; font-size: 16px; max-width: 80%;"></p>
            <button class="btn-action" onclick="resetGame()">กู้ระบบใหม่อีกครั้ง</button>
        </div>
    </div>

    <script>
        let timeLeft = 30.00;
        let timerInterval;
        let gameActive = false;
        let videoElement = null;
        
        let targetColor = '';
        let initialBrightness = {};
        let isFirstScan = true;
        
        const allColors = [
            { name: 'red', hex: '#ff0055', label: 'สายไฟสีแดง' },
            { name: 'yellow', hex: '#ffcc00', label: 'สายไฟสีเหลือง' },
            { name: 'blue', hex: '#0077ff', label: 'สายไฟสีน้ำเงิน' },
            { name: 'green', hex: '#00ff66', label: 'สายไฟสีเขียว' },
            { name: 'purple', hex: '#b100ff', label: 'สายไฟสีม่วง' }
        ];

        window.onload = function() {
            startARSystem();
        };

        function startARSystem() {
            videoElement = document.createElement('video');
            videoElement.setAttribute('autoplay', '');
            videoElement.setAttribute('muted', '');
            videoElement.setAttribute('playsinline', '');
            videoElement.style.width = '100%';
            videoElement.style.height = '100%';
            videoElement.style.objectFit = 'cover';
            document.getElementById('ar-camera-feed').appendChild(videoElement);

            navigator.mediaDevices.getUserMedia({ video: true, audio: false })
                .then(function(stream) {
                    videoElement.srcObject = stream;
                    videoElement.addEventListener('playing', function() {
                        setTimeout(() => {
                            resetGame(); 
                            startCheckingLoop();
                        }, 1000); // หน่วงเวลา 1 วินาทีให้กล้องปรับแสงเสร็จก่อนเริ่ม
                    });
                })
                .catch(function(err) {
                    alert("กรุณาเปิดแอป Iriun ให้เรียบร้อยครับ");
                });
        }

        function generateWires() {
            const overlay = document.getElementById('ar-wires-overlay');
            overlay.innerHTML = '';
            
            let shuffled = [...allColors].sort(() => 0.5 - Math.random());
            let currentRoundWires = shuffled.slice(0, Math.floor(Math.random() * 2) + 3);
            
            let targetObj = currentRoundWires[Math.floor(Math.random() * currentRoundWires.length)];
            targetColor = targetObj.name;
            
            const instruction = document.getElementById('instruction');
            instruction.innerHTML = `ตัดวงจรโดยยกมือบังเฉพาะ: <span style="color:${targetObj.hex}; font-weight:bold; text-shadow: 0 0 10px ${targetObj.hex};">"${targetObj.label}"</span>`;

            currentRoundWires.forEach(wire => {
                const capsule = document.createElement('div');
                capsule.className = 'wire-capsule';
                
                const wireLine = document.createElement('div');
                wireLine.id = `${wire.name}-wire`;
                wireLine.className = 'wire-line';
                wireLine.style.backgroundColor = wire.hex;
                wireLine.style.boxShadow = `0 0 20px ${wire.hex}, inset 0 0 10px rgba(0,0,0,0.5)`;
                
                const label = document.createElement('div');
                label.className = 'wire-label';
                label.innerText = wire.name === targetColor ? 'TARGET' : 'SECURE';
                if(wire.name === targetColor) {
                    label.style.borderColor = wire.hex;
                    label.style.color = wire.hex;
                }

                capsule.appendChild(wireLine);
                capsule.appendChild(label);
                overlay.appendChild(capsule);
            });
        }

        function startCheckingLoop() {
            setInterval(() => {
                if (!gameActive || !videoElement) return;

                allColors.forEach(wire => {
                    if(document.getElementById(`${wire.name}-wire`)) {
                        checkWireObstruction(wire.name);
                    }
                });
                
                // หลังจากสแกนรอบแรกเสร็จ ให้ปิดสถานะสแกนครั้งแรก
                if (isFirstScan) {
                    isFirstScan = false;
                }
            }, 100); 
        }

        function checkWireObstruction(colorName) {
            const wire = document.getElementById(colorName + '-wire');
            if (!wire) return;
            
            const rect = wire.getBoundingClientRect();
            const containerRect = document.getElementById('bomb-panel').getBoundingClientRect();

            const x = rect.left - containerRect.left;
            const y = rect.top - containerRect.top;
            
            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d');
            canvas.width = 10; 
            canvas.height = 10;

            try {
                ctx.drawImage(videoElement, x, y, rect.width, rect.height, 0, 0, canvas.width, canvas.height);
                const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
                const data = imageData.data;

                // คำนวณความสว่างเฉลี่ย (Luminance) ของพื้นที่สายไฟนั้น
                let totalBrightness = 0;
                for (let i = 0; i < data.length; i += 4) {
                    totalBrightness += (data[i] * 0.299 + data[i+1] * 0.587 + data[i+2] * 0.114);
                }
                let avgBrightness = totalBrightness / (data.length / 4);

                // บันทึกค่าแสงเริ่มต้นตอนเปิดเกม (Baseline)
                if (isFirstScan || !initialBrightness[colorName]) {
                    initialBrightness[colorName] = avgBrightness;
                    return;
                }

                // คำนวณเปอร์เซ็นต์ความมืดที่ลดลง (เมื่อเอามือบัง แสงจะดรอปลง)
                let dropPercent = ((initialBrightness[colorName] - avgBrightness) / initialBrightness[colorName]) * 100;

                // ตั้งระดับปานกลาง: ถ้าแสงลดลงเกิน 25% (มือบังจนมืดลงพอดี) ถือว่าเป็นการตัดสายไฟ
                let lightSensitivityThreshold = 25; 

                if (dropPercent > lightSensitivityThreshold) {
                    triggerWireCut(colorName);
                }
            } catch (e) {}
        }

        function triggerWireCut(colorName) {
            if (!gameActive) return;

            if (colorName === targetColor) {
                let label = allColors.find(c => c.name === targetColor).label;
                endGame(true, `ยอดเยี่ยม! คุณตัดวงจรที่ ${label} ได้ถูกเส้นสำเร็จ ระบบกลับมาปลอดภัยแล้ว`);
            } else {
                let wrongLabel = allColors.find(c => c.name === colorName).label;
                playExplosionVFX();
                endGame(false, `สัญญาณเตือนภัย! คุณพลาดไปตัด "${wrongLabel}" ทำให้ชนวนระเบิดทำงานทันที!`);
            }
        }

        function playExplosionVFX() {
            const exp = document.getElementById('explosion-effect');
            exp.style.display = 'block';
            exp.style.animation = 'boom 0.8s ease-out forwards';
            setTimeout(() => {
                exp.style.display = 'none';
                exp.style.animation = '';
            }, 800);
        }

        function endGame(isWin, message) {
            gameActive = false;
            clearInterval(timerInterval);
            
            document.getElementById('success-screen').style.display = 'none';
            document.getElementById('fail-screen').style.display = 'none';

            if (isWin) {
                document.getElementById('success-msg').innerText = message;
                document.getElementById('success-screen').style.display = 'flex';
            } else {
                document.getElementById('fail-msg').innerText = message;
                if(timeLeft <= 0) playExplosionVFX();
                document.getElementById('fail-screen').style.display = 'flex';
            }
        }

        function resetGame() {
            timeLeft = 30.00;
            gameActive = true;
            initialBrightness = {};
            isFirstScan = true;
            document.getElementById('timer').innerText = "30.00";
            document.getElementById('success-screen').style.display = 'none';
            document.getElementById('fail-screen').style.display = 'none';
            
            generateWires(); 
            
            clearInterval(timerInterval);
            timerInterval = setInterval(() => {
                if (timeLeft > 0 && gameActive) {
                    timeLeft -= 0.01;
                    document.getElementById('timer').innerText = timeLeft.toFixed(2);
                } else if (timeLeft <= 0) {
                    endGame(false, "ระบบล้มเหลว! เวลาหมดก่อนการกู้ระเบิดจะเสร็จสิ้น!");
                }
            }, 10);
        }
    </script>
</body>
</html>
