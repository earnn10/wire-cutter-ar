<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AR Cyber Defusal Zone (AI Finger Only)</title>
    <!-- ดึง AI ตรวจจับมือของ Google มาใช้งาน -->
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Prompt:wght@300;500;700&display=swap');
        
        body {
            margin: 0;
            padding: 0;
            font-family: 'Prompt', sans-serif;
            background: radial-gradient(circle, #1a0033 0%, #050010 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }

        #bomb-panel {
            position: relative;
            width: 640px;
            height: 480px;
            background: #0d0d1a;
            border: 4px solid #00f0ff;
            border-radius: 16px;
            box-shadow: 0 0 30px rgba(0, 240, 255, 0.3);
            overflow: hidden;
        }

        #webcam { display: none; }
        #output_canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            transform: scaleX(-1);
            pointer-events: none; /* ห้ามเมาส์คลิกโดนกล้อง */
        }

        #ar-wires-overlay {
            position: absolute;
            top: 0;
            left: 0;
            z-index: 3;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: space-around;
            align-items: flex-end;
            box-sizing: border-box;
            padding: 0 40px 60px 40px;
            pointer-events: none; /* ปิดการคลิกเมาส์และจิ้มจอถาวร 100% เมาส์จะกดสายไฟไม่ได้เลย */
        }

        .wire-capsule {
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
            pointer-events: none; 
        }

        .wire-line {
            width: 35px;
            height: 220px;
            border-radius: 16px;
            border: 3px solid #ffffff;
            background-image: repeating-linear-gradient(45deg, transparent, transparent 10px, rgba(0,0,0,0.3) 10px, rgba(0,0,0,0.3) 20px);
            transition: opacity 0.3s, transform 0.2s;
        }

        .wire-label {
            color: #ffffff;
            font-size: 12px;
            font-weight: bold;
            margin-top: 10px;
            padding: 2px 8px;
            background: rgba(0,0,0,0.6);
            border-radius: 4px;
            border: 1px solid rgba(255,255,255,0.3);
        }

        #ui-header {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            z-index: 4;
            background: linear-gradient(to bottom, rgba(13, 13, 26, 0.95), transparent);
            padding: 15px 0 10px 0;
            color: white;
            text-align: center;
            pointer-events: none;
        }

        #timer {
            font-family: 'Orbitron', sans-serif;
            font-size: 42px;
            color: #ff0055;
            font-weight: 700;
            text-shadow: 0 0 15px rgba(255, 0, 85, 0.8);
        }

        .screen-overlay {
            display: none;
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 10;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            color: white;
            /* หน้าจอนี้ให้กดปุ่มเริ่มใหม่ด้วยเมาส์ได้ */
            pointer-events: auto; 
        }
        #success-screen { background: rgba(0, 15, 5, 0.95); border: 4px solid #00ff66; }
        #fail-screen { background: rgba(20, 0, 5, 0.95); border: 4px solid #ff0055; }

        .btn-action {
            font-family: 'Prompt', sans-serif;
            padding: 10px 25px;
            font-size: 16px;
            font-weight: bold;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            margin-top: 15px;
            pointer-events: auto;
        }
        #success-screen .btn-action { background: #00cc52; }
        #fail-screen .btn-action { background: #ff0055; }
    </style>
</head>
<body>

    <div id="bomb-panel">
        <video id="webcam" autoplay playsinline></video>
        <canvas id="output_canvas"></canvas>
        <div id="ar-wires-overlay"></div>

        <div id="ui-header">
            <span style="font-size: 11px; color: #00f0ff; letter-spacing: 3px; font-weight: bold;">AI FINGER ONLY v6.1</span>
            <div id="timer">30.00</div>
            <div id="instruction">กำลังโหลดระบบ AI แขนเสื้อไม่ระเบิด...</div>
        </div>
        
        <div id="success-screen" class="screen-overlay">
            <h1 style="font-family: 'Orbitron'; color: #00ff66; margin: 0;">SYSTEM SECURED</h1>
            <p id="success-msg"></p>
            <button class="btn-action" onclick="resetGame()">เริ่มใหม่</button>
        </div>

        <div id="fail-screen" class="screen-overlay">
            <h1 style="font-family: 'Orbitron'; color: #ff0055; margin: 0;">💥 DETONATED 💥</h1>
            <p id="fail-msg"></p>
            <button class="btn-action" onclick="resetGame()">ลองใหม่</button>
        </div>
    </div>

    <script>
        const videoElement = document.getElementById('webcam');
        const canvasElement = document.getElementById('output_canvas');
        const canvasCtx = canvasElement.getContext('2d');
        
        let timeLeft = 30.00;
        let timerInterval;
        let gameActive = false;
        let targetColor = '';
        let wirePositions = []; 

        const allColors = [
            { name: 'red', hex: '#ff0055', label: 'สายไฟสีแดง' },
            { name: 'yellow', hex: '#ffcc00', label: 'สายไฟสีเหลือง' },
            { name: 'blue', hex: '#0077ff', label: 'สายไฟสีน้ำเงิน' },
            { name: 'green', hex: '#00ff66', label: 'สายไฟสีเขียว' }
        ];

        const hands = new Hands({
            locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
        });
        hands.setOptions({
            maxNumHands: 1,
            modelComplexity: 1,
            minDetectionConfidence: 0.6,
            minTrackingConfidence: 0.6
        });
        hands.onResults(onHandResults);

        const camera = new Camera(videoElement, {
            onFrame: async () => {
                await hands.send({ image: videoElement });
            },
            width: 640,
            height: 480
        });
        camera.start().then(() => {
            document.getElementById('instruction').innerText = "ระบบ AI พร้อม! กำลังเริ่มเกม...";
            setTimeout(resetGame, 1000);
        });

        function generateWires() {
            const overlay = document.getElementById('ar-wires-overlay');
            overlay.innerHTML = '';
            
            let shuffled = [...allColors].sort(() => 0.5 - Math.random());
            let currentWires = shuffled.slice(0, 3); 
            
            let targetObj = currentWires[Math.floor(Math.random() * currentWires.length)];
            targetColor = targetObj.name;
            
            document.getElementById('instruction').innerHTML = `เอานิ้วชี้กางอากาศแตะที่: <span style="color:${targetObj.hex}; font-weight:bold;">"${targetObj.label}"</span>`;

            currentWires.forEach((wire, index) => {
                const capsule = document.createElement('div');
                capsule.className = 'wire-capsule';
                
                const wireLine = document.createElement('div');
                wireLine.id = `${wire.name}-wire`;
                wireLine.className = 'wire-line';
                wireLine.style.backgroundColor = wire.hex;
                wireLine.style.boxShadow = `0 0 20px ${wire.hex}`;
                
                const label = document.createElement('div');
                label.className = 'wire-label';
                label.innerText = wire.name === targetColor ? 'TARGET' : 'SECURE';

                capsule.appendChild(wireLine);
                capsule.appendChild(label);
                overlay.appendChild(capsule);
            });

            setTimeout(() => {
                wirePositions = [];
                currentWires.forEach(wire => {
                    const el = document.getElementById(`${wire.name}-wire`);
                    if (el) {
                        const rect = el.getBoundingClientRect();
                        const panelRect = document.getElementById('bomb-panel').getBoundingClientRect();
                        wirePositions.push({
                            name: wire.name,
                            left: rect.left - panelRect.left,
                            right: rect.right - panelRect.left,
                            top: rect.top - panelRect.top,
                            bottom: rect.bottom - panelRect.top
                        });
                    }
                });
            }, 300);
        }

        function onHandResults(results) {
            canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);
            canvasCtx.drawImage(results.image, 0, 0, canvasElement.width, canvasElement.height);

            if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0 && gameActive) {
                const landmarks = results.multiHandLandmarks[0];
                const indexFingerTip = landmarks[8]; // จุดปลายนิ้วชี้
                
                const fingerX = (1 - indexFingerTip.x) * canvasElement.width;
                const fingerY = indexFingerTip.y * canvasElement.height;

                // วาดเป้าเล็งสีฟ้าที่ปลายนิ้วชี้
                canvasCtx.beginPath();
                canvasCtx.arc(fingerX, fingerY, 8, 0, 2 * Math.PI);
                canvasCtx.fillStyle = '#00f0ff';
                canvasCtx.fill();
                canvasCtx.strokeStyle = '#ffffff';
                canvasCtx.lineWidth = 2;
                canvasCtx.stroke();

                wirePositions.forEach(wire => {
                    if (fingerX >= wire.left && fingerX <= wire.right &&
                        fingerY >= wire.top && fingerY <= wire.bottom) {
                        triggerWireCut(wire.name);
                    }
                });
            }
        }

        function triggerWireCut(colorName) {
            if (!gameActive) return;

            if (colorName === targetColor) {
                endGame(true, `ภารกิจสำเร็จ! ใช้ปลายนิ้วชี้ตัดสายไฟถูกต้อง`);
            } else {
                endGame(false, `ระเบิดทำงาน! นิ้วชี้ของคุณไปโดนสายไฟเส้นอื่น`);
            }
        }

        function endGame(isWin, message) {
            gameActive = false;
            clearInterval(timerInterval);
            if (isWin) {
                document.getElementById('success-msg').innerText = message;
                document.getElementById('success-screen').style.display = 'flex';
            } else {
                document.getElementById('fail-msg').innerText = message;
                document.getElementById('fail-screen').style.display = 'flex';
            }
        }

        function resetGame() {
            canvasElement.width = 640;
            canvasElement.height = 480;
            
            timeLeft = 30.00;
            gameActive = true;
            document.getElementById('timer').innerText = "30.00";
            document.getElementById('success-screen').style.display = 'none';
            document.getElementById('fail-screen').style.display = 'none';
            
            generateWires();
            
            clearInterval(timerInterval);
            timerInterval = setInterval(() => {
                if (timeLeft > 0 && gameActive) {
                    timeLeft -= 0.01;
                    document.getElementById('timer').innerText = timeLeft.toFixed(2);
                } else if (timeLeft <= 0) {
                    endGame(false, "เวลาหมดกู้ระเบิดไม่ทัน!");
                }
            }, 10);
        }
    </script>
</body>
</html>
